    <path d="M-160,45 Q-60,-15 90,-10 Q170,0 205,30" fill="none" stroke="#0a0a0a" stroke-width="3" opacity="0.4"/>
    <!-- Side stripe (SPLY-350 area) -->
    <rect x="-30" y="-20" width="80" height="20" fill="#ffffff" rx="2"/>
    <text x="10" y="-5" font-family="monospace" font-size="14" font-weight="bold" fill="#0a0a0a" text-anchor="middle" stroke="none">SPLY-350</text>
    <!-- Heel pull -->
    <path d="M180,-30 L200,-50 L210,-30 Z" fill="#ff5c8d"/>
    <!-- Lace area -->
    <line x1="-50" y1="-40" x2="-30" y2="-40"/>
    <line x1="-50" y1="-25" x2="-30" y2="-25"/>
    <line x1="-50" y1="-10" x2="-30" y2="-10"/>
