<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <g transform="translate(400,320)" stroke="#0a0a0a" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <ellipse cx="20" cy="100" rx="220" ry="14" fill="#0a0a0a" opacity="0.15" stroke="none"/>
    <!-- Boost sole -->
    <path d="M-200,90 Q-200,115 -175,118 L185,118 Q215,118 220,90 L220,60 Q220,55 210,55 L-195,55 Q-200,55 -200,60 Z" fill="#ffffff"/>
    <!-- Boost dots texture -->
    <g fill="#0a0a0a" stroke="none">
      <circle cx="-160" cy="85" r="3"/>
      <circle cx="-140" cy="95" r="3"/>
      <circle cx="-115" cy="80" r="3"/>
      <circle cx="-90" cy="92" r="3"/>
      <circle cx="-65" cy="85" r="3"/>
      <circle cx="-40" cy="95" r="3"/>
      <circle cx="-15" cy="82" r="3"/>
      <circle cx="10" cy="92" r="3"/>
      <circle cx="35" cy="85" r="3"/>
      <circle cx="60" cy="95" r="3"/>
      <circle cx="85" cy="82" r="3"/>
      <circle cx="110" cy="92" r="3"/>
      <circle cx="135" cy="85" r="3"/>
      <circle cx="160" cy="95" r="3"/>
      <circle cx="185" cy="82" r="3"/>
    </g>
    <!-- Primeknit upper -->
    <path d="M-185,55 Q-180,20 -140,-15 Q-80,-55 0,-58 Q90,-60 160,-40 Q200,-25 215,5 Q220,30 215,55 Z" fill="#a3ff00"/>
    <!-- Knit stripe pattern -->
